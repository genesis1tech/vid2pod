version: "3.9"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vid2pod:vid2pod@postgres:5432/vid2pod
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: vid2pod-media
      S3_REGION: us-east-1
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - ./src:/app/src

  worker:
    build: .
    command: node dist/processing/worker.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vid2pod:vid2pod@postgres:5432/vid2pod
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: vid2pod-media
      S3_REGION: us-east-1
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-development}

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vid2pod
      POSTGRES_PASSWORD: vid2pod
      POSTGRES_DB: vid2pod
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vid2pod"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  miniodata:
