<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViddyPod Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0b1020;
      color: #f1f5f9;
      padding: 24px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .logo { font-size: 20px; font-weight: 700; }
    .status-row { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 16px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.connected { background: #10b981; }
    .dot.disconnected { background: #ef4444; }
    .dot.working { background: #f59e0b; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { font-size: 14px; }
    .email { font-size: 12px; color: #94a3b8; margin-left: auto; }
    button {
      background: #6366f1; color: white; border: none; padding: 10px 16px;
      border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 500;
    }
    button:hover { background: #4f46e5; }
    button.secondary { background: rgba(255,255,255,0.1); }
    button.secondary:hover { background: rgba(255,255,255,0.15); }
    .button-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 8px; }
    .download-list { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 8px; }
    .download-item { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .download-item:last-child { border-bottom: none; }
    .download-item .title { font-weight: 500; }
    .download-item .meta { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .empty { text-align: center; color: #94a3b8; font-size: 13px; padding: 16px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">ViddyPod Agent</div>
  </div>

  <div id="status-row" class="status-row">
    <div id="dot" class="dot disconnected"></div>
    <div id="status-text" class="status-text">Not signed in</div>
    <div id="email" class="email"></div>
  </div>

  <div class="button-row">
    <button id="signin-btn">Sign In</button>
    <button id="signout-btn" class="secondary" style="display:none">Sign Out</button>
  </div>

  <div class="section-title">Recent Downloads</div>
  <div id="downloads" class="download-list">
    <div class="empty">No downloads yet</div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
