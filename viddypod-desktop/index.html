<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViddyPod Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0b1020;
      color: #f1f5f9;
      padding: 20px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .logo { font-size: 18px; font-weight: 700; }
    .status-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.connected { background: #10b981; }
    .dot.disconnected { background: #ef4444; }
    .dot.working { background: #f59e0b; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { font-size: 13px; }
    .email { font-size: 11px; color: #94a3b8; margin-left: auto; }
    button {
      background: #6366f1; color: white; border: none; padding: 8px 14px;
      border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 500;
    }
    button:hover { background: #4f46e5; }
    button.secondary { background: rgba(255,255,255,0.1); }
    button.secondary:hover { background: rgba(255,255,255,0.15); }
    button.tiny { padding: 4px 8px; font-size: 11px; }
    .button-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 6px; margin-top: 8px; }
    .card {
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .pair-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .pair-label { font-size: 11px; color: #94a3b8; }
    code#pair-token {
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 11px;
      background: rgba(0,0,0,0.3);
      padding: 3px 6px;
      border-radius: 4px;
      color: #c4b5fd;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sync-meta { font-size: 10px; color: #64748b; }
    .download-list { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 6px; }
    .download-item { padding: 6px 10px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .download-item:last-child { border-bottom: none; }
    .download-item .title { font-weight: 500; }
    .download-item .meta { font-size: 10px; color: #94a3b8; margin-top: 2px; }
    .empty { text-align: center; color: #94a3b8; font-size: 12px; padding: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">ViddyPod Agent</div>
  </div>

  <div id="status-row" class="status-row">
    <div id="dot" class="dot disconnected"></div>
    <div id="status-text" class="status-text">Not signed in</div>
    <div id="email" class="email"></div>
  </div>

  <div class="button-row">
    <button id="signin-btn">Sign In</button>
    <button id="signout-btn" class="secondary" style="display:none">Sign Out</button>
  </div>

  <div class="section-title">Browser Extension</div>
  <div class="card">
    <div id="extension-status-row" class="status-row" style="margin-bottom: 8px; padding: 6px 10px;">
      <div id="ext-dot" class="dot disconnected"></div>
      <div id="ext-status-text" class="status-text">Extension: not connected</div>
    </div>
    <div class="pair-row">
      <span class="pair-label">Pair token:</span>
      <code id="pair-token">loading...</code>
      <button id="copy-token" class="secondary tiny">Copy</button>
    </div>
    <div id="sync-meta" class="sync-meta"></div>
  </div>

  <div class="section-title">Recent Downloads</div>
  <div id="downloads" class="download-list">
    <div class="empty">No downloads yet</div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
