name: Build ViddyPod Desktop Agent

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'  # Apple Silicon
            args: '--target aarch64-apple-darwin'
            ytdlp_url: 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos'
            ytdlp_dest: 'viddypod-desktop/src-tauri/binaries/yt-dlp-aarch64-apple-darwin'
          - platform: 'macos-13'  # Intel
            args: '--target x86_64-apple-darwin'
            ytdlp_url: 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos'
            ytdlp_dest: 'viddypod-desktop/src-tauri/binaries/yt-dlp-x86_64-apple-darwin'
          - platform: 'ubuntu-latest'
            args: ''
            ytdlp_url: 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux'
            ytdlp_dest: 'viddypod-desktop/src-tauri/binaries/yt-dlp-x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            ytdlp_url: 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe'
            ytdlp_dest: 'viddypod-desktop/src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev

      - name: Download yt-dlp binary
        shell: bash
        run: |
          mkdir -p viddypod-desktop/src-tauri/binaries
          curl -L -o "${{ matrix.ytdlp_dest }}" "${{ matrix.ytdlp_url }}"
          if [ "${{ matrix.platform }}" != "windows-latest" ]; then
            chmod +x "${{ matrix.ytdlp_dest }}"
          fi

      - name: Download Node.js portable (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p viddypod-desktop/src-tauri/binaries/node-windows
          curl -L -o node.zip "https://nodejs.org/dist/v22.11.0/node-v22.11.0-win-x64.zip"
          unzip -o node.zip "node-v22.11.0-win-x64/node.exe" -d node-extracted
          cp node-extracted/node-v22.11.0-win-x64/node.exe viddypod-desktop/src-tauri/binaries/node-windows/node.exe
          rm -rf node.zip node-extracted
          ls -la viddypod-desktop/src-tauri/binaries/node-windows/node.exe

      - name: Install npm dependencies
        working-directory: viddypod-desktop
        run: npm install

      - name: Build Tauri app
        working-directory: viddypod-desktop
        run: npx tauri build ${{ matrix.args }}

      - name: Upload build artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: viddypod-${{ matrix.platform == 'macos-latest' && 'macos-arm64' || 'macos-x64' }}
          path: |
            viddypod-desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            viddypod-desktop/src-tauri/target/**/release/bundle/macos/*.app

      - name: Upload build artifacts (Linux)
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: viddypod-linux
          path: |
            viddypod-desktop/src-tauri/target/release/bundle/deb/*.deb
            viddypod-desktop/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload build artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: viddypod-windows
          path: |
            viddypod-desktop/src-tauri/target/release/bundle/msi/*.msi
            viddypod-desktop/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ViddyPod Desktop ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            artifacts/**/*.exe
